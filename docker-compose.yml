services:
  timesheetiq:
    build: .
    container_name: timesheetiq
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
