name: Deploy to Server

on:
  # Manual trigger only — go to Actions tab → Deploy to Server → Run workflow
  workflow_dispatch:
  # Uncomment the lines below to auto-deploy on every push once secrets are set:
  # push:
  #   branches: [master]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets are configured
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ SERVER_HOST secret is not set. Go to repo Settings → Secrets → Actions to add it."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /opt/timesheetiq

            echo "📥 Pulling latest code..."
            git pull origin master

            echo "🐳 Rebuilding containers..."
            docker compose up -d --build --remove-orphans

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "⏳ Waiting for health check..."
            sleep 8
            curl -sf http://localhost/api/health || echo "⚠️ Health check failed"

            echo "✅ Deployment complete!"
